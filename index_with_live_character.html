<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Character Gameplay</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #hud { position: absolute; top: 10px; left: 10px; z-index: 100; }
        #mini-map { position: absolute; top: 10px; right: 10px; width: 200px; height: 200px; border: 1px solid black; }
    </style>
</head>
<body>
    <div id="hud">
        <h2>Player Stats</h2>
        <p id="health">Health: 100</p>
        <p id="stamina">Stamina: 100</p>
        <p id="action-log">Action Log:</p>
    </div>
    <div id="mini-map"></div>
    <script>
        let player = {
            x: 50,
            y: 50,
            health: 100,
            stamina: 100,
            dash: false,
            crouch: false
        };

        let enemies = [];
        let npcs = [];

        // Initialize game
        function init() {
            document.addEventListener('keydown', handleKeyDown);
            generateNPCs();
            generateEnemies();
            update();
        }

        function handleKeyDown(event) {
            switch (event.key) {
                case 'ArrowUp':
                case 'w':
                    player.y -= 5; // Move up
                    break;
                case 'ArrowDown':
                case 's':
                    player.y += 5; // Move down
                    break;
                case 'ArrowLeft':
                case 'a':
                    player.x -= 5; // Move left
                    break;
                case 'ArrowRight':
                case 'd':
                    player.x += 5; // Move right
                    break;
                case 'Shift':
                    player.dash = true;
                    break;
                case 'Control':
                    player.crouch = true;
                    break;
            }
            update();
        }

        function update() {
            document.getElementById('health').innerText = 'Health: ' + player.health;
            document.getElementById('stamina').innerText = 'Stamina: ' + player.stamina;
            // Update mini map, enemy positions, etc.
        }

        function generateNPCs() {
            // Generate NPC logic here
        }

        function generateEnemies() {
            // Generate enemies and implement chasing logic here
        }

        init();
    </script>
</body>
</html>
